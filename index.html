<script>
    // [중요] 여기에 발급받은 실제 API Key를 입력해야 403 에러가 해결됩니다.
    const apiKey = ""; 

    async function requestGemini(type) {
        // API Key 유무 사전 체크 로직 추가
        if (!apiKey || apiKey === "AIzaSyAnL0V3vndTskdhVQKwzpnQ4FxOqb_RH3Q") {
            const resultText = document.getElementById('aiResultText');
            const resultArea = document.getElementById('aiResultArea');
            resultText.innerHTML = "<span class='text-rose-500 font-bold'>설정 오류: API Key가 입력되지 않았습니다. 관리자에게 문의하세요.</span>";
            resultArea.classList.remove('hidden');
            return;
        }

        const inputMap = {
            'idea': 'aiIdeaInput', 'doc': 'aiDocInput', 'qna': 'aiQnaInput',
            'email': 'aiEmailInput', 'logic': 'aiLogicInput', 'simul': 'aiSimulInput',
            'plan': 'aiPlanInput', 'scenario': 'aiScenarioInput', 'value': 'aiValueInput'
        };
        
        const inputEl = document.getElementById(inputMap[type]);
        const userInput = inputEl ? inputEl.value.trim() : "";

        if (!userInput) return alert("내용을 입력해 주세요.");

        // 시스템 프롬프트 설정 (기존과 동일)
        let systemPrompt = "";
        if (type === 'idea') systemPrompt = "당신은 아이피허브(IPHUB)의 수석 특허 전략가입니다...";
        // ... 생략 ...

        const loading = document.getElementById('aiLoading');
        const resultArea = document.getElementById('aiResultArea');
        const resultText = document.getElementById('aiResultText');
        
        loading.classList.remove('hidden');
        resultArea.classList.add('hidden');

        try {
            const text = await fetchGeminiWithRetry(userInput, systemPrompt);
            resultText.innerHTML = parseSimpleMarkdown(text);
            loading.classList.add('hidden');
            resultArea.classList.remove('hidden');
        } catch (error) {
            console.error("API 호출 중 상세 에러:", error);
            loading.classList.add('hidden');
            
            // HTTP 상태 코드별 맞춤 안내
            let userFriendlyMsg = "네트워크 지연이 발생했습니다. 다시 시도해 주세요.";
            if (error.message.includes("403")) {
                userFriendlyMsg = "인증 오류(403): 유효하지 않은 API Key이거나 권한이 제한되었습니다.";
            } else if (error.message.includes("429")) {
                userFriendlyMsg = "요청 한도 초과(429): 잠시 후 다시 시도해 주세요.";
            }

            resultText.innerHTML = `<span class='text-red-500 font-bold'>${userFriendlyMsg}</span>`;
            resultArea.classList.remove('hidden');
        }
    }

    // API 호출 엔진 (에러 전파 로직 강화)
    async function fetchGeminiWithRetry(userPrompt, systemPrompt, retries = 5) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        const delays = [1000, 2000, 4000, 8000, 16000];
        
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`HTTP ${response.status}: ${errorData.error.message}`);
                }
                
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "결과 생성 실패";
            } catch (error) {
                if (i === retries - 1 || error.message.includes("403")) throw error;
                await new Promise(res => setTimeout(res, delays[i])); 
            }
        }
    }

    // ... 기타 탭 전환 및 마크다운 파서 로직 유지 ...
</script>
