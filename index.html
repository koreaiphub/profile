<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이피허브(IPHUB) - 특허경영 오케스트레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; }
        #scroll-progress {
            position: fixed;
            top: 64px;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(to right, #3b82f6, #6366f1);
            z-index: 60;
            transition: width 0.1s ease-out;
        }
        .chart-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; height: 350px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link.active { color: #2563eb; font-weight: 700; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .floating-btn { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .ai-result-content strong { color: #312e81; font-weight: 900; background-color: #e0e7ff; padding: 0 4px; border-radius: 4px; }
        .ai-result-content h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 1.125rem; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #e0e7ff; padding-bottom: 4px; }
        .animate-on-scroll { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-on-scroll.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="antialiased scroll-smooth">

<div id="scroll-progress"></div>

<nav class="fixed w-full z-50 bg-white/90 backdrop-blur border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <span class="text-2xl font-black text-orange-600 tracking-tighter">IPHUB</span>
            </div>
            <div class="hidden md:flex items-center space-x-8">
                <a href="#home" class="nav-link text-slate-600 hover:text-blue-600 font-medium text-sm transition-colors">홈</a>
                <a href="#ai-assistant" class="nav-link text-slate-600 hover:text-indigo-600 font-medium text-sm transition-colors">AI 특허 어시스턴트</a>
                <a href="#education" class="nav-link text-slate-600 hover:text-blue-600 font-medium text-sm transition-colors">VOD 특허 교육</a>
                <a href="#orchestration" class="nav-link text-slate-600 hover:text-blue-600 font-medium text-sm transition-colors">오케스트레이션</a>
                <a href="#strategy" class="nav-link text-slate-600 hover:text-blue-600 font-medium text-sm transition-colors">핵심 전략</a>
                <a href="#performance" class="nav-link text-slate-600 hover:text-blue-600 font-medium text-sm transition-colors">압도적 성과</a>
                <a href="#about" class="nav-link text-slate-600 hover:text-blue-600 font-medium text-sm transition-colors">조직 & 서비스</a>
            </div>
        </div>
    </div>
</nav>

<main class="pt-16">
    <section id="home" class="bg-slate-900 text-white pt-24 pb-32 overflow-hidden text-center">
        <div class="max-w-7xl mx-auto px-4">
            <p class="text-amber-400 font-bold tracking-wider mb-4">특허경영 오케스트레이션 전문회사</p>
            <h1 class="text-4xl md:text-6xl font-black mb-6">내 기술 못베끼게 하는<br><span class="text-blue-400">강력 무기</span> 특허!</h1>
            <p class="text-xl text-slate-300 max-w-2xl mx-auto mb-10 leading-relaxed">
                아이피허브는 여러 악기가 모여 하나의 교향곡을 완성하듯,<br>기업의 사업 목표에 맞추어 특허 경영 전 과정을 지휘합니다.
            </p>
            <div class="flex justify-center gap-4">
                <a href="#orchestration" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all">솔루션 보기</a>
                <a href="#performance" class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-full transition-all">성과 확인하기</a>
            </div>
        </div>
    </section>

    <section id="ai-assistant" class="py-20 bg-indigo-50">
        <div class="max-w-7xl mx-auto px-4">
            <h2 class="text-3xl font-bold text-slate-900 mb-4">AI 특허 어시스턴트</h2>
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col border border-indigo-200">
                <div class="p-4 bg-slate-50 border-b overflow-x-auto flex gap-3">
                    <button id="tab-idea" onclick="switchAITab('idea')" class="whitespace-nowrap px-4 py-2 rounded-lg text-sm font-bold bg-indigo-600 text-white shadow-md">아이디어 진단</button>
                    <!-- (다른 버튼들 동일) -->
                </div>
                <div class="p-6 min-h-[400px]">
                    <div id="view-idea" class="block">
                        <textarea id="aiIdeaInput" rows="4" class="w-full p-3 border rounded-xl mb-3 text-sm" placeholder="비즈니스 아이디어를 입력하세요."></textarea>
                        <button onclick="requestGemini('idea')" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">분석 시작하기</button>
                    </div>
                    <!-- (기타 탭 생략) -->
                    <div id="aiLoading" class="hidden flex flex-col items-center py-12">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-4"></div>
                        <p class="text-sm font-bold animate-pulse">분석 중...</p>
                    </div>
                    <div id="aiResultArea" class="hidden mt-6 bg-slate-50 rounded-xl p-6 border">
                        <div id="aiResultText" class="text-sm leading-relaxed"></div>
                        <div class="mt-6 flex flex-col sm:flex-row gap-2">
                            <button onclick="copyToClipboard()" class="flex-1 bg-white border border-indigo-200 py-2 rounded-lg text-xs font-bold">결과 복사</button>
                            <button onclick="downloadAIResult()" class="flex-1 bg-slate-800 text-white py-2 rounded-lg text-xs font-bold">텍스트 저장</button>
                            <button onclick="openAILeadModal()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold">이메일 받기</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ... (기타 섹션 코드 유지) ... -->

</main>

<script>
    // 스크롤 및 애니메이션 공통 로직
    window.addEventListener('scroll', () => {
        const winScroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById('scroll-progress').style.width = (winScroll / height * 100) + '%';
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if(entry.isIntersecting) entry.target.querySelectorAll('.animate-on-scroll').forEach(el => el.classList.add('visible')); });
    }, { threshold: 0.1 });

    document.addEventListener('DOMContentLoaded', () => {
        const diagram = document.getElementById('ai-assistant'); // 관찰 대상
        if(diagram) observer.observe(diagram);
    });

    // 클립보드 복사
    function copyToClipboard() {
        const text = document.getElementById('aiResultText').innerText;
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        alert("복사되었습니다.");
    }

    // AI 서비스 핵심 로직 (에러 핸들링 강화)
    async function requestGemini(type) {
        const input = document.getElementById('aiIdeaInput').value.trim();
        if(!input) return alert("내용을 입력하세요.");

        const loading = document.getElementById('aiLoading');
        const area = document.getElementById('aiResultArea');
        const text = document.getElementById('aiResultText');

        loading.classList.remove('hidden');
        area.classList.add('hidden');

        try {
            const result = await fetchGeminiWithRetry(input, "당신은 아이피허브의 전문가입니다.");
            text.innerHTML = result.replace(/\n/g, '<br>');
            loading.classList.add('hidden');
            area.classList.remove('hidden');
        } catch (e) {
            console.error(e);
            loading.classList.add('hidden');
            let msg = "네트워크 지연이 발생했습니다. 다시 시도해 주세요.";
            if(e.message.includes("403")) msg = "인증 오류(403): API Key 설정이 필요하거나 권한이 거부되었습니다.";
            text.innerHTML = `<span class="text-red-500 font-bold">${msg}</span>`;
            area.classList.remove('hidden');
        }
    }

    async function fetchGeminiWithRetry(userPrompt, systemPrompt) {
        const apiKey = "AIzaSyAnL0V3vndTskdhVQKwzpnQ4FxOqb_RH3Q"; // 런타임 주입 또는 수동 기입 필요
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            })
        });

        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const json = await response.json();
        return json.candidates[0].content.parts[0].text;
    }

    function switchAITab(type) {
        window.currentAIType = type;
        // 탭 UI 전환 로직...
    }
</script>
</body>
</html>
